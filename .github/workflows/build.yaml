name: Build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: write # needed to attach binaries to a GitHub Release on tag push

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./... -race

  build:
    name: Build (${{ matrix.goos }}/${{ matrix.goarch }})
    needs: test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            ext: ""
          - goos: linux
            goarch: arm64
            ext: ""
          - goos: windows
            goarch: amd64
            ext: ".exe"

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: Verify modules
        run: go mod tidy && go mod verify

      - name: Vet
        run: go vet ./...

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          mkdir -p dist
          out="dist/shelter-cli-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}"
          go build -trimpath -ldflags="-s -w" -o "$out" ./cmd/ipbox
          echo "Built $out"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: shelter-cli-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/shelter-cli-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}
          if-no-files-found: error

  release:
    name: Publish release
    needs: build
    if: github.event_name == 'push' && (startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Set release vars
        id: vars
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            tag="${{ github.ref_name }}"
            echo "tag_name=$tag" >> "$GITHUB_OUTPUT"
            echo "name=$tag" >> "$GITHUB_OUTPUT"
            if [[ "$tag" == *-* ]]; then
              # contains a hyphen -> semver pre-release, e.g. v0.3.4-beta.412
              echo "prerelease=true" >> "$GITHUB_OUTPUT"
              echo "make_latest=false" >> "$GITHUB_OUTPUT"
            else
              # plain vX.Y.Z -> real release
              echo "prerelease=false" >> "$GITHUB_OUTPUT"
              echo "make_latest=true" >> "$GITHUB_OUTPUT"
            fi
          else
            # push to main: rolling nightly build, same tag reused/overwritten each run
            echo "tag_name=nightly" >> "$GITHUB_OUTPUT"
            echo "name=Nightly Build" >> "$GITHUB_OUTPUT"
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
            echo "make_latest=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create/update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.vars.outputs.tag_name }}
          name: ${{ steps.vars.outputs.name }}
          prerelease: ${{ steps.vars.outputs.prerelease }}
          make_latest: ${{ steps.vars.outputs.make_latest }}
          body: ${{ github.ref == 'refs/heads/main' && format('Automated build from commit {0}.', github.sha) || '' }}
          files: dist/*
          fail_on_unmatched_files: true