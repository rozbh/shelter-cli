name: auto-beta-tag

on:
  workflow_run:
    workflows: ["test"]
    types: [completed]
    branches: [main]

jobs:
  tag:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: compute next beta tag
        id: nextver
        run: |
          latest=$(git tag -l 'v*.*.*' --sort=-v:refname | grep -v beta | head -n1)
          latest=${latest:-v0.0.0}
          IFS='.' read -r major minor patch <<< "${latest#v}"
          next="v${major}.${minor}.$((patch+1))-beta.${{ github.run_number }}"
          echo "tag=$next" >> "$GITHUB_OUTPUT"

      - name: create and push tag
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git tag ${{ steps.nextver.outputs.tag }}
          git push origin ${{ steps.nextver.outputs.tag }}